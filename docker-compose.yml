services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    expose:
      - "80"
    environment:
      VIRTUAL_PORT: 80
      VIRTUAL_HOST: ${FRONTEND_DOMAIN:-points-accelerator.local}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devtksg
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      GUILD_ID: ${GUILD_ID}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_OAUTH_REDIRECT_URI: ${DISCORD_OAUTH_REDIRECT_URI}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      VIRTUAL_PORT: 3001
      VIRTUAL_HOST: ${BACKEND_DOMAIN:-points-accelerator-api.local}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devtksg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pointsaccelerator
      POSTGRES_USER: pointsaccelerator
      POSTGRES_PASSWORD: pointsaccelerator
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pointsaccelerator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - devtksg
    restart: unless-stopped

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-points-accelerator-postgres}

networks:
  devtksg:
    external: true
