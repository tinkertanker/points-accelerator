services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: points-accelerator-frontend:latest
    container_name: points-accelerator-frontend
    expose:
      - "80"
    environment:
      VIRTUAL_PORT: 80
      VIRTUAL_HOST: ${APP_DOMAIN}
      LETSENCRYPT_HOST: ${APP_DOMAIN}
      LETSENCRYPT_EMAIL: ${APP_EMAIL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
      - devtksg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: points-accelerator-backend:latest
    container_name: points-accelerator-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      GUILD_ID: ${GUILD_ID}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_OAUTH_REDIRECT_URI: ${DISCORD_OAUTH_REDIRECT_URI}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME}
      MESSAGE_REWARD_COOLDOWN_SECONDS: ${MESSAGE_REWARD_COOLDOWN_SECONDS:-60}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: points-accelerator-postgres
    # Conservative defaults for a shared desktop host (the bot, the API, and
    # Postgres coexist here, serving ~10 guilds). Override per-host via the
    # POSTGRES_*_KB env vars if the box has more or less memory. Keep `postgres`
    # as the first element so the official image's init entrypoint still runs.
    # statement_timeout caps runaway ledger SUMs so they fail fast instead of
    # stalling other requests; kept at 30s so legitimate serializable bets and
    # the (occasional, large) economy-reset transactions still complete.
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-4MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1GB}
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
      - -c
      - statement_timeout=${POSTGRES_STATEMENT_TIMEOUT:-30000}
      - -c
      - idle_in_transaction_session_timeout=${POSTGRES_IDLE_TX_TIMEOUT:-10000}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-points-accelerator-postgres}

networks:
  devtksg:
    external: true
